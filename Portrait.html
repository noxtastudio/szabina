<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portrait — Szabina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --paper:#faf2e0;
    --ink:#1a0c05;
    --ink-soft:#3b251a;
    --muted:#8b7866;
    --terra:#b8401b;
    --terra-deep:#7a2a10;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--bg);color:var(--ink);font-family:"Cormorant Garamond", Georgia, serif;font-weight:400;-webkit-font-smoothing:antialiased;min-height:100vh}
  a{color:inherit;text-decoration:none}
  .small-caps{font-family:"IBM Plex Mono", monospace;text-transform:uppercase;letter-spacing:0.28em;font-size:11px;font-weight:400}

  /* mast */
  .mast{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;justify-content:space-between;align-items:center;
    padding:18px 24px;color:var(--ink);
    pointer-events:none;
  }
  .mast .wordmark{font-size:14px;letter-spacing:0.32em;text-transform:uppercase;font-weight:500;font-family:"Cormorant Garamond",serif;cursor:pointer;transition:opacity .2s;padding:9px 18px;pointer-events:auto}
  .mast .wordmark:hover{opacity:.6}
  .mast .right{display:flex;gap:22px;align-items:center;padding:9px 18px;pointer-events:auto}
  .mast a{transition:opacity .2s}
  .mast a:hover{opacity:.6}
  /* Hamburger toggle (hidden on desktop) */
  .mast .menu-toggle{
    display:none;
    width:38px;height:38px;
    background:transparent;
    border:1px solid rgba(60,40,30,0.18);
    border-radius:50%;color:var(--ink);cursor:pointer;
    align-items:center;justify-content:center;
    pointer-events:auto;position:relative;
  }
  .mast .menu-toggle span{
    position:absolute;left:11px;
    display:block;width:16px;height:1px;background:currentColor;
    transition:transform .25s ease, opacity .2s ease, top .25s ease;
  }
  .mast .menu-toggle span:nth-child(1){top:13px}
  .mast .menu-toggle span:nth-child(2){top:18px}
  .mast .menu-toggle span:nth-child(3){top:23px}
  .mast.menu-open .menu-toggle span:nth-child(1){top:18px;transform:rotate(45deg)}
  .mast.menu-open .menu-toggle span:nth-child(2){opacity:0}
  .mast.menu-open .menu-toggle span:nth-child(3){top:18px;transform:rotate(-45deg)}

  @media (max-width: 600px){
    .mast{padding:12px 12px}
    .mast .wordmark{padding:7px 12px;border-radius:18px;font-size:11px;letter-spacing:.22em}
    .mast .menu-toggle{display:flex}
    .mast .right{
      display:none;
      position:absolute;top:calc(100% + 6px);right:12px;
      flex-direction:column;align-items:flex-end;gap:14px;
      padding:18px 22px;border-radius:18px;
      font-size:11px;letter-spacing:.22em;
      background:rgba(255,255,255,0.92);
      border:1px solid rgba(60,40,30,0.18);
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    }
    .mast.menu-open .right{display:flex}
    .mast .right a{white-space:nowrap}
  }

  /* hero */
  .hero{
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:120px 40px 80px;
    text-align:center;
  }
  .eyebrow{color:var(--terra);margin-bottom:32px;display:block}
  .hero h1{
    font-weight:300;font-size:clamp(56px,8vw,140px);
    line-height:0.98;letter-spacing:-0.02em;color:var(--ink);
    margin-bottom:32px;
  }
  .hero h1 em{font-style:italic;color:var(--terra-deep);font-weight:300}
  .hero p{
    font-size:clamp(18px,1.4vw,22px);line-height:1.6;color:var(--ink-soft);
    font-style:italic;max-width:48ch;margin-bottom:48px;
  }
  .hero .back{
    display:inline-flex;align-items:center;gap:12px;
    padding:14px 26px;
    border:1px solid var(--ink);border-radius:999px;
    color:var(--ink);
    font-family:"IBM Plex Mono",monospace;text-transform:uppercase;letter-spacing:.22em;font-size:11px;
    transition:background .2s, color .2s;
  }
  .hero .back:hover{background:var(--ink);color:var(--paper)}

  .copy{
    padding:24px 40px;
    border-top:1px solid rgba(60,40,30,0.18);
    display:flex;justify-content:space-between;color:var(--muted);
  }
  @media (max-width: 600px){
    .copy{flex-direction:column;gap:8px;text-align:center}
  }
</style>
</head>
<body>

<header class="mast">
  <a href="Szabina.html" class="wordmark">Szabina</a>
  <button class="menu-toggle" aria-label="Menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <div class="right small-caps">
    <a href="index.html">Home</a>
    <a href="Szabina.html">About</a>
    <a href="Travel.html">Travel</a>
    <a href="https://instagram.com/szabina.bks" target="_blank" rel="noopener">@szabina.bks ↗</a>
  </div>
</header>

<script>
  (function setupMobileMenu(){
    const mast = document.querySelector('.mast');
    const toggle = mast && mast.querySelector('.menu-toggle');
    if (!toggle) return;
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = mast.classList.toggle('menu-open');
      toggle.setAttribute('aria-expanded', String(isOpen));
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.mast')) {
        mast.classList.remove('menu-open');
        toggle.setAttribute('aria-expanded', 'false');
      }
    });
    mast.querySelectorAll('.right a').forEach(a => a.addEventListener('click', () => {
      mast.classList.remove('menu-open');
      toggle.setAttribute('aria-expanded', 'false');
    }));
  })();
</script>

<section class="hero">
  <span class="eyebrow small-caps">Portrait</span>
  <h1>Coming <em>soon</em>.</h1>
  <p>A portrait series is in the works. Check back later — or follow along on Instagram for first looks.</p>
  <a class="back" href="Szabina.html">← Back to About</a>
</section>

<footer class="copy small-caps">
  <span>Szabina B.</span>
  <span>Site by <a href="https://noxta.studio" target="_blank" rel="noopener">noxta.studio</a></span>
  <span>Netherlands</span>
</footer>

</body>
</html>
